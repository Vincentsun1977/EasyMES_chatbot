<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>AI Chatbot</title>
    <link rel="icon" type="image/png" href="/static-debug/chatbot.png">
    <link rel="stylesheet" href="/static-debug/chat.css?v=61">
</head>
<body>
    <div class="chat-container">
        <!-- Sidebar for conversation history -->
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>历史会话</h3>
                <div class="sidebar-header-actions">
                    <button id="multiSelectBtn" class="btn-icon-small" title="多选删除">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"/>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                        </svg>
                    </button>
                    <button id="closeSidebar" class="btn-icon-small" title="关闭">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="conversationBulkActions" class="sidebar-bulk-actions hidden">
                <span id="selectedCountText">已选择 0 项</span>
                <div class="sidebar-bulk-actions-right">
                    <button id="bulkDeleteBtn" class="bulk-delete-btn" type="button">删除选中</button>
                    <button id="cancelMultiSelectBtn" class="bulk-cancel-btn" type="button">取消</button>
                </div>
            </div>
            <div id="conversationList" class="conversation-list">
                <div class="loading-conversations">
                    <div class="spinner"></div>
                    <span>加载中...</span>
                </div>
            </div>
        </div>
        
        <!-- Sidebar overlay for mobile -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>
        
        <!-- Chat Header -->
        <div class="chat-header">
            <button id="menuBtn" class="btn-icon" title="历史会话">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h18M3 6h18M3 18h18"/>
                </svg>
            </button>
            <h2>小易 - EasyMES AI助手 <span class="header-version">v1.0.1-beta.2+build.20260325</span></h2>
            <div class="header-actions">
                <button id="clearBtn" class="btn-icon" title="新对话">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h8"/>
                        <path d="M17 3v6M14 6h6"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Chat Messages -->
        <div id="chatMessages" class="chat-messages">
            <div class="message bot-message">
                <div class="message-avatar bot-avatar">小易</div>
                <div class="message-content">
                    <div class="markdown-body">
                        <p class="intro-text"><strong>您好！我是小易，我可以回答关于 EasyMES 的相关问题，比如：</strong></p>
                        <div class="markdown-section">
                            <ul>
                                <li class="query-icon-item"><img src="/static-debug/Prod_line.png" alt="产线数据" class="inline-query-icon">  某月某产线的完成数量</li>
                                <li class="query-icon-item"><img src="/static-debug/worker.png" alt="操作员信息" class="inline-query-icon">  某操作工人某天的完成数量</li>
                                <li class="query-icon-item"><img src="/static-debug/Para.png" alt="订单参数" class="inline-query-icon">  某订单或产品的参数</li>
                            </ul>
                        </div>
                        <div class="markdown-section">
                            <h4 class="markdown-h4 markdown-section-heading markdown-auto-heading important-heading"><strong>重要提示</strong></h4>
                            <ul>
                                <li>请尽量提供具体的信息，以便我更好地帮助您，比如订单号、工序名称、日期等。</li>
                                <li>目前小易是在内测阶段，功能可能不完全稳定，欢迎反馈您的使用体验。😀</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="chat-input-container">
            <form id="chatForm">
                <textarea 
                    id="messageInput" 
                    placeholder="输入您的问题..." 
                    rows="1"
                    maxlength="2000"
                ></textarea>
                <button type="button" id="sendBtn" class="send-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Connection Status -->
        <div id="connectionStatus" class="connection-status hidden">
            <span class="status-dot"></span>
            <span class="status-text">连接中...</span>
        </div>
    </div>

    <script src="/static-debug/chat.js?v=83"></script>
</body>
</html>
